<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Tab</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 260px;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 16px;
      gap: 14px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .header-icon {
      width: 20px;
      height: 20px;
      opacity: 0.75;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: #111;
      letter-spacing: 0.3px;
    }

    /* QR container */
    #qr-wrapper {
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      overflow: hidden;
      background: #f7f7f7;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 8px;
    }

    #qr-wrapper canvas {
      border-radius: 4px;
    }

    /* URL label */
    #url-label {
      font-size: 10px;
      color: #888;
      text-align: center;
      max-width: 228px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Download button */
    #download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 22px;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      background: #1a1a1a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    #download-btn:hover {
      background: #333;
    }

    #download-btn:active {
      transform: scale(0.97);
    }

    #download-btn svg {
      flex-shrink: 0;
    }

    /* Error state */
    #error-msg {
      font-size: 11px;
      color: #e53935;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="4" height="4"/>
      <rect x="3" y="21" width="4" height="4" style="display:none"/>
    </svg>
    <span class="title">QR Tab</span>
  </div>

  <!-- QR Code — qrcodejs appends a canvas/img into this div -->
  <div id="qr-wrapper"></div>

  <!-- Current URL -->
  <div id="url-label">Loading…</div>

  <!-- Error -->
  <div id="error-msg">Could not read the current tab URL.</div>

  <!-- Download -->
  <button id="download-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12l7 7 7-7"/>
    </svg>
    Save as PNG
  </button>

  <!-- QR library (bundled locally for CSP compliance) -->
  <script src="qrcode.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
